<!DOCTYPE html>
<html>
<head>
    <title>Payment</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1f1c2c, #928dab);
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 15px;
            width: 320px;
            text-align: center;
            color: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        h2 {
            margin-bottom: 10px;
        }

        #amount {
            margin-bottom: 20px;
            font-size: 18px;
            color: #ffd700;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            outline: none;
        }

        input:focus {
            box-shadow: 0 0 5px #ffd700;
        }

        .row {
            display: flex;
            gap: 10px;
        }

        .row input {
            width: 100%;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #ffd700;
            color: black;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: white;
            transform: scale(1.05);
        }

        .secure {
            margin-top: 10px;
            font-size: 12px;
            opacity: 0.8;
        }

    </style>
</head>

<body>

<div class="container">

    <h2>Secure Payment 💳</h2>
    <h3 id="amount"></h3>

    <input type="text" placeholder="Card Number">
    <input type="text" placeholder="Card Holder Name">

    <div class="row">
        <input type="text" placeholder="MM/YY">
        <input type="text" placeholder="CVV">
    </div>

    <button class="btn" onclick="payNow()">Pay Now</button>

    <div class="secure">🔒 100% Secure Payment</div>

</div>

<script>
let total = localStorage.getItem("totalAmount");
document.getElementById("amount").innerText = "Total Amount: ₹" + total;

function payNow() {

    let inputs = document.querySelectorAll("input");
    let isValid = true;

    inputs.forEach(input => {
        if(input.value.trim() === ""){
            isValid = false;
        }
    });

    if(!isValid){
        alert("⚠️ Please enter all details!");
        return;
    }

    alert("Payment Successful 🎉");

    localStorage.removeItem("cart");
    localStorage.removeItem("totalAmount");

    window.location.href = "index.html";
}
</script>
</script>

</body>
</html>
