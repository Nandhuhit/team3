<!DOCTYPE html>
<html>
<head>
    <title>EliteWear Collections</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            color: white;
            text-align: center;
        }

        header {
            background: rgba(0,0,0,0.6);
            padding: 15px;
            font-size: 22px;
            letter-spacing: 1px;
        }

        .container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            padding: 40px;
        }

        .card {
            position: relative;
            width: 280px;
            height: 350px;
            margin: 20px;
            border-radius: 15px;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .overlay {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: rgba(0,0,0,0.6);
            padding: 15px;
        }

        .overlay h2 {
            margin: 0;
        }

        .btn {
            margin-top: 10px;
            padding: 8px 15px;
            background: #ffd700;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        .btn:hover {
            background: white;
        }

        .back {
            margin: 30px;
        }

    </style>
</head>

<body>

<header>
    EliteWear Collections ✨
</header>

<div class="container">

    <!-- WOMEN -->
    <div class="card" onclick="goTo('casual.html')">
        <img src="https://images.unsplash.com/photo-1490481651871-ab68de25d43d">
        <div class="overlay">
            <h2>Women 👗</h2>
            <button class="btn">Explore</button>
        </div>
    </div>

    <!-- MEN -->
    <div class="card" onclick="goTo('traditional.html')">
        <img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b">
        <div class="overlay">
            <h2>Men 👔</h2>
            <button class="btn">Explore</button>
        </div>
    </div>

    <!-- KIDS -->
    <div class="card" onclick="goTo('kids.html')">
        <img src="https://images.unsplash.com/photo-1519238263530-99bdd11df2ea">
        <div class="overlay">
            <h2>Kids 👶</h2>
            <button class="btn">Explore</button>
        </div>
    </div>

</div>

<div class="back">
    <button class="btn" onclick="location.href='index.html'">⬅ Back Home</button>
</div>

<script>
if(localStorage.getItem("loggedIn") !== "true"){
    window.location.href = "login.html";
}

function goTo(page){
    window.location.href = page;
}
</script>

</body>
</html>
