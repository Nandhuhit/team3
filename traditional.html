<!DOCTYPE html>
<html>
<head>
    <title>Men's Wear</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f5f5f5;
        }

        header {
            background: black;
            color: white;
            padding: 15px;
            text-align: center;
        }

        section {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: white;
            margin: 15px;
            padding: 10px;
            width: 220px;
            text-align: center;
            box-shadow: 0 0 10px gray;
            border-radius: 10px;
        }

        .card img {
            width: 100%;
            height: 250px;
            border-radius: 10px;
        }

        .btn {
            padding: 8px 15px;
            background: black;
            color: white;
            border: none;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn:hover {
            background: #444;
        }

    </style>
</head>

<body>

<header>
    <h1>Men's Collection 👔</h1>
</header>

<section>

<!-- 1 -->
<div class="card">
    <img src="https://images.unsplash.com/photo-1618354691373-d851c5c3a990">
    <h3>Formal Shirt</h3>
    <p>₹1200</p>
    <button class="btn" onclick="buyNow('Formal Shirt',1200)">Buy Now</button>
</div>

<!-- 2 -->
<div class="card">
    <img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b">

    <button class="btn" onclick="buyNow('Blazer',2999)">Buy Now</button>
</div>

<!-- 5 -->
<div class="card">
    <img src="https://images.unsplash.com/photo-1490481651871-ab68de25d43d">
    <h3>Jeans</h3>
    <p>₹1499</p>
    <button class="btn" onclick="buyNow('Jeans',1499)">Buy Now</button>

<!-- 6 -->

    <button class="btn" onclick="buyNow('Summer Shirt',999)">Buy Now</button>

</section>

<div style="text-align:center; margin:30px;">
    <button class="btn" onclick="location.href='index.html'">⬅ Back Home</button>
</div>

<script>
if(!localStorage.getItem("loggedIn")){
    window.location.href = "login.html";
}

function buyNow(name, price){
    localStorage.setItem("totalAmount", price);
    window.location.href = "payment.html";
}
</script>

</body>
</html>
